name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'gitops/manifests/**'
      - 'terraform/**'
      - 'packer/**'
      - 'ansible/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'gitops/manifests/**'
      - 'terraform/**'
      - 'packer/**'
      - 'ansible/**'
      - '.github/workflows/**'

jobs:
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: gitops/manifests/
          framework: kubernetes
          quiet: true
          soft_fail: false
          skip_check: CKV_K8S_38,CKV_K8S_35,CKV_K8S_40

  trivy:
    name: Trivy Misconfiguration Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: gitops/manifests/
          severity: HIGH,CRITICAL
          exit-code: 1
