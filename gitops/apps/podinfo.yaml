apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: podinfo
  namespace: argocd
  labels:
    app: podinfo
spec:
  project: default
  source:
    repoURL: https://github.com/abdelhaouari/homelab.git
    targetRevision: main
    path: gitops/manifests/podinfo
  destination:
    server: https://kubernetes.default.svc
    namespace: podinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
