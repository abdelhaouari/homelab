apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signatures
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Images from ghcr.io/abdelhaouari must be signed with Cosign
      using keyless signing via GitHub OIDC. Policy set to Audit
      due to GHCR OCI Referrers API limitation with Kyverno.
spec:
  validationFailureAction: Audit
  webhookTimeoutSeconds: 30
  background: false
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/abdelhaouari/*"
          mutateDigest: false
          verifyDigest: false
          imageRegistryCredentials:
            secrets:
              - ghcr-secret
          attestors:
            - entries:
                - keyless:
                    subject: "*abdelhaouari*"
                    issuer: "https://github.com/login/oauth"
                    rekor:
                      url: https://rekor.sigstore.dev
