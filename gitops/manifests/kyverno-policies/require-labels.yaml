apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require App Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: low
    policies.kyverno.io/description: >-
      All pods must have an 'app' label for identification,
      monitoring, and network policy targeting.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-app-label
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - metallb-system
                - argocd
                - vault
                - falco
      validate:
        message: "The label 'app' is required on all pods."
        pattern:
          metadata:
            labels:
              app: "?*"
