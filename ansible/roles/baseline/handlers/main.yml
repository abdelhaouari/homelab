---
# ==============================================================================
# handlers/main.yml - Handlers for the baseline security role
# ==============================================================================

- name: Restart Fail2Ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Reload sysctl config
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Reload auditd rules
  # augenrules --load safely merges rules in /etc/audit/rules.d/ without
  # stopping the auditd daemon, preventing blind spots.
  ansible.builtin.command: augenrules --load
  changed_when: true
